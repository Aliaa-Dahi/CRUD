<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section>
      <div class="container bg-info p-4 rounded-4 my-3">
        <h1 class="text-center">CRUD SYSTEM</h1>
        <div>
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="productName"
              placeholder="name@example.com"
            />
            <label for="productName">Product Name</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="number"
              class="form-control"
              id="productPrice"
              placeholder="name@example.com"
            />
            <label for="productPrice">Product Price</label>
          </div>
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="productCategory" placeholder="name@example.com" list="dataCategory">
            <label for="productCategory">Product Category</label>
            <datalist id="dataCategory">
                <option value="tv"></option>
                <option value="mobile"></option>
                <option value="screens"></option>
                <option value="electronics"></option>
            </datalist>
          </div>
          <div class="form-floating mb-3">
            <textarea style="height: 100px;" class="form-control" id="productDescription" placeholder="Product Description"></textarea>
            <label for="productDescription">Product Description</label>
          </div>
          <div class="form-floating mb-3">
            <input
              type="file"
              class="form-control"
              id="productImage"
              placeholder="name@example.com"
            />
            <label for="productImage"">Product Image</label>
          </div>

          <!-- buttons -->
          <button onclick="addProduct()" class="btn btn-light mb-3" id="addBtn">Add Product</button>
          <button onclick="updateProduct()" class="btn btn-outline-dark mb-3" id="addBtn">Update Product</button>
        </div>
      </div>
    </section>
    <section>
        <div class="container-fluid">
            <input type="search" class="form-control w-50 mx-auto my-4" placeholder="Search by name">
            <div class="row" id="rowData">
                
            </div>
        </div>
    </section>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
